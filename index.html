<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114-2 高三科技應用專題作品集 - 杜韋諺</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.9);
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --text-color: #e0e0e0;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* 背景科技網格感 */
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)),
                radial-gradient(circle, #1a1a2e 0%, #0a0a0c 100%);
            background-size: 100% 2px, 3px 100%, cover;
        }

        /* 上方橫幅 */
        header {
            height: 80px;
            background: var(--panel-bg);
            border-bottom: 2px solid var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            z-index: 10;
            position: relative;
        }

        header h1 {
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* 主要內容佈局 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左方選單 */
        nav {
            width: 280px;
            background: rgba(10, 10, 15, 0.95);
            border-right: 1px solid rgba(0, 243, 255, 0.2);
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-btn {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn:hover, .menu-btn.active {
            background: rgba(0, 243, 255, 0.1);
            border-left: 4px solid var(--neon-blue);
            color: white;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1);
        }

        /* 右方顯示區 */
        .content-view {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        /* 內容區塊動畫 */
        .content-section {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            animation: slideIn 0.6s forwards;
        }

        .content-section.active {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(188, 19, 254, 0.3);
            padding: 40px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel::before {
            content: "SYSTEM LOG // DATA_STREAM";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--neon-purple);
            padding: 2px 10px;
            font-size: 10px;
            color: black;
            font-weight: bold;
        }

        h2 { color: var(--neon-purple); margin-bottom: 25px; font-size: 1.8rem; }
        p { line-height: 1.8; margin-bottom: 20px; font-size: 1.1rem; color: #ccc; }

        /* 重點提醒按鈕 */
        .highlight-btn {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .highlight-btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .iframe-container {
            width: 100%;
            height: 450px;
            border: 1px solid var(--neon-blue);
            margin-top: 20px;
            background: #000;
        }

        /* 彈出視窗 (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: #15151a;
            border: 2px solid var(--neon-blue);
            padding: 30px;
            max-width: 500px;
            text-align: left;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.4);
        }

        .modal h3 { color: var(--neon-blue); margin-bottom: 15px; }
        .modal button {
            margin-top: 25px;
            background: var(--neon-blue);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

    </style>
</head>
<body>

<header>
    <h1>114-2 高三科技應用專題作品集 - 31014 杜韋諺</h1>
</header>

<div class="main-container">
    <nav>
        <div class="menu-btn active" onclick="switchTab('intro')">主控制台</div>
        <div class="menu-btn" onclick="switchTab('game1')">網頁遊戲 1：貪吃蛇</div>
    </nav>

    <div class="content-view">
        
        <div id="intro" class="content-section active">
            <div class="panel">
                <h2>> 數位檔案初始化...</h2>
                <p>身分驗證：31014 杜韋諺</p>
                <p>歡迎進入科技應用專題開發環境。本作品集紀錄了從邏輯構思到 AI 協作的完整開發歷程。</p>
                <button class="highlight-btn" onclick="showModal('開發願景', '透過 AI 工具的輔助，將抽象的想法轉化為具體的互動體驗，是本次專題的核心目標。')">查看開發核心理念</button>
            </div>
        </div>

        <div id="game1" class="content-section">
            <div class="panel">
                <h2>[ 專案：經典重構 - 貪吃蛇 ]</h2>
                <p><strong>創作心得：</strong></p>
                <p>我覺得用 AI 做網頁小遊戲真的非常方便，之前還要慢慢地打程式碼跟除錯，現在不用了，我只需要把我的想法跟 AI 說，他就會依照我的想法生成出我要做的東西！</p>
                <p>其中，製作 3D 物件很有趣，Google AI Studio 生成網頁遊戲令我印象深刻。</p>
                
                <button class="highlight-btn" onclick="showModal('技術挑戰報告', '我覺得最難的是網頁上傳到 GitHub 過程很瑣碎，碰到了非常多的難關，還好一一解決，最後也得到滿滿的成就感。')">顯示開發難點分析</button>

                <h3 style="margin-top:30px; color:var(--neon-blue);">遊戲預覽：</h3>
                <iframe src="https://ouo123178.github.io/GAME/ai_studio_code.html" class="iframe-container"></iframe>
            </div>
        </div>

    </div>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3 id="modalTitle">系統提示</h3>
        <p id="modalContent"></p>
        <button onclick="closeModal()">關閉通訊視窗</button>
    </div>
</div>

<script>
    // 切換選單
    function switchTab(tabId) {
        // 更新按鈕狀態
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.currentTarget.classList.add('active');

        // 更新內容顯示
        document.querySelectorAll('.content-section').forEach(section => {
            section.classList.remove('active');
        });
        document.getElementById(tabId).classList.add('active');
    }

    // 彈窗邏輯
    function showModal(title, content) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalContent').innerText = content;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    // 初始化背景音效感（可自由決定是否加入）
    console.log("System initialized. User: 31014 Du.");
</script>

</body>
</html>
